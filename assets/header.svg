<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ezra Magagane - Junior Software Engineer, Java and Spring Boot Backend">
  <defs>
    <!-- Dark background gradient (tokyonight-inspired) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16161e"/>
      <stop offset="55%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>

    <!-- Animated accent gradient that sweeps across the title -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#9d7cd8"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9d7cd8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0.25"/>
    </linearGradient>

    <clipPath id="round">
      <rect x="0" y="0" width="1000" height="260" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="1000" height="260" fill="url(#bg)"/>

    <!-- Faint grid dots -->
    <g fill="#7aa2f7" opacity="0.10">
      <circle cx="60"  cy="40"  r="2"/>
      <circle cx="140" cy="90"  r="2"/>
      <circle cx="40"  cy="150" r="2"/>
      <circle cx="920" cy="60"  r="2"/>
      <circle cx="860" cy="120" r="2"/>
      <circle cx="960" cy="180" r="2"/>
    </g>

    <!-- Floating accent particles -->
    <circle cx="820" cy="70" r="4" fill="#6C63FF">
      <animate attributeName="cy" values="70;50;70" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="150" r="3" fill="#7aa2f7">
      <animate attributeName="cy" values="150;170;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="200" r="3" fill="#9d7cd8">
      <animate attributeName="cy" values="200;185;200" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.25;0.8" dur="4.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Title -->
    <text x="500" y="112" text-anchor="middle"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="58" font-weight="800" fill="url(#accent)">
      Ezra Magagane
    </text>

    <!-- Animated underline that grows and shrinks -->
    <rect x="360" y="132" height="4" rx="2" fill="url(#accent)">
      <animate attributeName="width" values="0;280;280;0" keyTimes="0;0.4;0.7;1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="500;360;360;500" keyTimes="0;0.4;0.7;1" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- Subtitle -->
    <text x="500" y="172" text-anchor="middle"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="21" font-weight="500" fill="#c0caf5" letter-spacing="1">
      Junior Software Engineer &#8226; Java &amp; Spring Boot Backend
    </text>

    <!-- Small tagline with blinking cursor -->
    <text x="500" y="204" text-anchor="middle"
      font-family="'Fira Code', 'Consolas', monospace"
      font-size="15" fill="#7aa2f7">
      &#60;/&#62; FinTech &#38; E-Commerce &#8226; Shipping to production on AWS
      <tspan fill="#6C63FF" font-weight="700">_<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
    </text>

    <!-- Animated bottom waves -->
    <path fill="url(#wave2)">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="
          M0,235 C160,210 320,255 500,232 C680,210 840,252 1000,230 L1000,260 L0,260 Z;
          M0,232 C160,255 320,210 500,238 C680,258 840,214 1000,236 L1000,260 L0,260 Z;
          M0,235 C160,210 320,255 500,232 C680,210 840,252 1000,230 L1000,260 L0,260 Z"/>
    </path>
    <path fill="url(#wave1)">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M0,244 C180,228 340,262 500,244 C700,224 860,260 1000,242 L1000,260 L0,260 Z;
          M0,242 C180,262 340,226 500,248 C700,264 860,228 1000,246 L1000,260 L0,260 Z;
          M0,244 C180,228 340,262 500,244 C700,224 860,260 1000,242 L1000,260 L0,260 Z"/>
    </path>

    <!-- Border -->
    <rect x="1" y="1" width="998" height="258" rx="18" fill="none" stroke="#6C63FF" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>
</svg>
